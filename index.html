<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auxilium &mdash; Just Solution</title>
    <link rel="icon" href="assets/auxilium-logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
            <div class="brand">
                <img src="assets/auxilium-logo.png" alt="Auxilium" class="brand-logo">
                <span class="brand-name">Auxilium</span>
            </div>

            <nav class="nav">
                <div class="nav-section-label">Інструменти</div>

                <button class="nav-item active" data-tool="iban" onclick="openTool(this, 'iframe', 'https://stasewych.github.io/Payment-Reconciliation-2.0/')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18M3 12h18M3 18h18"/><path d="M8 6v12"/><path d="M16 6v12"/>
                    </svg>
                    <span>Фільтрація IBAN</span>
                </button>

                <button class="nav-item" data-tool="calc" onclick="openTool(this, 'iframe', 'https://calculator.justsolution.co/')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/>
                    </svg>
                    <span>Калькулятор судових зборів</span>
                </button>

                <button class="nav-item" data-tool="ocr" onclick="openTool(this, 'iframe', 'https://auxilium-ocr.justsolution.co/')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/>
                    </svg>
                    <span>Сканер документів</span>
                </button>

                <button class="nav-item" data-tool="zvirka" onclick="openTool(this, 'iframe', 'https://justsolution-org.github.io/Zvirka/')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 14l2 2 4-4"/>
                    </svg>
                    <span>Звірка надходжень</span>
                </button>

                <button class="nav-item" data-tool="debtors" onclick="openTool(this, 'iframe', 'https://check.justsolution.org')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span>Перевірка боржників</span>
                </button>

                <div class="nav-divider"></div>
                <div class="nav-section-label">Програми</div>

                <button class="nav-item" data-tool="clicker" onclick="openTool(this, 'download', '#')">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 15l-2 5L9 9l11 4-5 2z"/><path d="M22 22l-5-5"/>
                    </svg>
                    <span>Клікер</span>
                    <span class="badge">Desktop</span>
                </button>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <div class="powered-by">
                <img src="assets/just-solution-logo.png" alt="Just Solution" class="powered-logo">
                <span>Just Solution</span>
            </div>
        </div>
    </aside>

    <!-- MOBILE HEADER -->
    <header class="mobile-header" id="mobileHeader">
        <button class="menu-toggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <div class="mobile-brand">
            <img src="assets/auxilium-logo.png" alt="Auxilium" class="mobile-brand-logo">
            <span>Auxilium</span>
        </div>
    </header>

    <!-- OVERLAY for mobile -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- MAIN CONTENT -->
    <main class="main" id="main">
        <!-- Welcome screen -->
        <div class="welcome" id="welcome">
            <div class="welcome-inner">
                <img src="assets/auxilium-logo.png" alt="Auxilium" class="welcome-logo">
                <h1>Auxilium</h1>
                <p class="welcome-sub">Платформа юридичних інструментів</p>
                <div class="welcome-grid">
                    <button class="welcome-card" onclick="document.querySelector('[data-tool=iban]').click()">
                        <span class="wc-title">Фільтрація IBAN</span>
                        <span class="wc-desc">Виключення зарплатних рахунків з реєстру</span>
                    </button>
                    <button class="welcome-card" onclick="document.querySelector('[data-tool=calc]').click()">
                        <span class="wc-title">Калькулятор судових зборів</span>
                        <span class="wc-desc">Розрахунок зборів для судових справ</span>
                    </button>
                    <button class="welcome-card" onclick="document.querySelector('[data-tool=ocr]').click()">
                        <span class="wc-title">Сканер документів</span>
                        <span class="wc-desc">Розпізнавання та обробка документів</span>
                    </button>
                    <button class="welcome-card" onclick="document.querySelector('[data-tool=zvirka]').click()">
                        <span class="wc-title">Звірка надходжень</span>
                        <span class="wc-desc">Перевірка платежів боржників</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Iframe container -->
        <div class="iframe-wrap" id="iframeWrap">
            <div class="iframe-bar" id="iframeBar">
                <span class="iframe-title" id="iframeTitle"></span>
                <button class="iframe-close" onclick="closeTool()" title="Закрити">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <iframe id="toolFrame" src="" frameborder="0" allow="clipboard-read; clipboard-write"></iframe>
        </div>

        <!-- Download page -->
        <div class="download-page" id="downloadPage">
            <div class="download-inner">
                <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <h2 id="downloadTitle">Завантажити програму</h2>
                <p id="downloadDesc">Посилання на завантаження буде додано найближчим часом.</p>
                <a class="download-btn disabled" id="downloadBtn" href="#" target="_blank">
                    Завантажити
                </a>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
